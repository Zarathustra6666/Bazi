    else if(row.sixHePillars.length)narr+=` มี<strong>六合กับเสา${row.sixHePillars.join('/')}</strong> — เสริมความสัมพันธ์และการร่วมมือ`;
    const narrDiv=document.createElement('div');
    narrDiv.style.cssText='margin-bottom:.9rem;background:var(--input-bg);border-left:4px solid var(--primary2);border-radius:0 8px 8px 0;padding:.8rem 1rem;font-size:.84rem;line-height:1.7';
    narrDiv.innerHTML=`<div style="font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem">อ่านดวงวัน</div>${narr}`;
    detailDiv.appendChild(narrDiv);
  }

  function render(year,month){
    sec.innerHTML='';
    const rows=calcDailyForecast(chart,year,month);
    const scored=rows.map(r=>({...r,...scoreDailyDay(r,chart)}));

    // ── Detail area (selected day or today) ──
    const detailDiv=document.createElement('div');
    const initRow=scored.find(r=>r.year===selYear&&r.month===selMonth&&r.date===selDate)
      ||scored.find(r=>r.isToday)||scored[0];
    renderDetail(initRow,detailDiv);
    sec.appendChild(detailDiv);

    // ── Month nav ──
    const navRow=document.createElement('div');
    navRow.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem';
    const prevBtn=document.createElement('button');prevBtn.textContent='← เดือนก่อน';prevBtn.style.cssText='background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;cursor:pointer;font-size:.8rem';
    const nextBtn=document.createElement('button');nextBtn.textContent='เดือนถัดไป →';nextBtn.style.cssText='background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;cursor:pointer;font-size:.8rem';
    const monthLabel=document.createElement('div');monthLabel.style.cssText='font-weight:700;color:var(--primary);font-size:.95rem';
    monthLabel.textContent=`${MONTH_TH[month-1]} ${year}`;
    prevBtn.onclick=()=>{navMonth--;if(navMonth<1){navMonth=12;navYear--;}render(navYear,navMonth);};
    nextBtn.onclick=()=>{navMonth++;if(navMonth>12){navMonth=1;navYear++;}render(navYear,navMonth);};
    navRow.appendChild(prevBtn);navRow.appendChild(monthLabel);navRow.appendChild(nextBtn);
    sec.appendChild(navRow);

    // ── Calendar grid ──
    const DAY_NAMES=['จ','อ','พ','พฤ','ศ','ส','อา'];
    const calWrap=document.createElement('div');calWrap.style.cssText='overflow-x:auto';
    const cal=document.createElement('table');cal.style.cssText='width:100%;border-collapse:collapse;table-layout:fixed';
    const thead=cal.createTHead();const hr=thead.insertRow();
    DAY_NAMES.forEach(n=>{const th=document.createElement('th');th.textContent=n;th.style.cssText='padding:.3rem 0;font-size:.72rem;font-weight:600;color:var(--muted);text-align:center;border-bottom:1px solid var(--border)';hr.appendChild(th);});
    const tbody=cal.createTBody();
    const firstJsDay=new Date(year,month-1,1).getDay();
    const offset=(firstJsDay+6)%7;
    let tr=tbody.insertRow();
    for(let i=0;i<offset;i++){const td=tr.insertCell();td.style.cssText='padding:.25rem;border:1px solid transparent';}
    let col=offset;
    for(const row of scored){
      if(col===7){tr=tbody.insertRow();col=0;}
      const td=tr.insertCell();
      const ds2=STEMS[row.dSi],db2=BRANCHES[row.dBi];
      const qBg=row.stars>=3?'rgba(22,163,74,.12)':row.stars===1?'rgba(220,38,38,.1)':'transparent';
      const isSel=row.year===selYear&&row.month===selMonth&&row.date===selDate;
      const cellBorder=row.isToday?`border:2px solid var(--primary);border-radius:6px`
        :isSel?`border:2px solid var(--primary2);border-radius:6px`
        :`border:1px solid var(--border)`;
      const clashDot=row.clashPillars.length?`<div style="font-size:.55rem;color:#dc2626;line-height:1">⚡</div>`:'';
      const dblDot=row.isDouble?`<div style="font-size:.55rem;color:#d97706;line-height:1">✦</div>`:'';
      td.style.cssText=`padding:.25rem .15rem;text-align:center;${cellBorder};background:${qBg};cursor:pointer`;
      td.innerHTML=`<div style="font-size:.72rem;color:var(--muted);line-height:1.2">${row.date}</div>`+
        `<div style="font-size:.78rem;font-weight:700;color:${elColor(ds2.el)};line-height:1.3">${ds2.zh}${db2.zh}</div>`+
        `${clashDot}${dblDot}`;
      td.onclick=(r=>()=>{selYear=r.year;selMonth=r.month;selDate=r.date;renderDetail(r,detailDiv);
        // update cell borders in-place
        const allTds=cal.querySelectorAll('tbody td[data-d]');
        allTds.forEach(c=>{
          const d=+c.dataset.d;
          const s=d===selDate;
          const t=r.isToday&&d===today.getDate()&&year===today.getFullYear()&&month===(today.getMonth()+1);
          c.style.borderWidth=s||t?'2px':'1px';
          c.style.borderStyle='solid';
          c.style.borderColor=t?'var(--primary)':s?'var(--primary2)':'var(--border)';
          c.style.borderRadius=s||t?'6px':'0';
        });
      })(row);
      td.dataset.d=row.date;
      col++;
    }
    while(col>0&&col<7){const td=tr.insertCell();td.style.cssText='padding:.25rem;border:1px solid transparent';col++;}
    calWrap.appendChild(cal);sec.appendChild(calWrap);

    // Legend
    const leg=document.createElement('div');leg.style.cssText='font-size:.7rem;color:var(--muted);margin-top:.4rem';
    leg.textContent='คลิกวันใดก็ได้เพื่ออ่านดวง · ⚡ = 六冲 · ✦ = ดาวคู่ · พื้นเขียว = ★★/★★★ · พื้นแดง = ⚠';
    sec.appendChild(leg);
  }

  render(navYear,navMonth);
}

    <span style="font-size:1.45rem">${prof.image}</span>
    <span style="font-weight:700;font-size:1rem;color:${elColor(dm.el)}">${dm.zh} ${dm.th}</span>

function getElementDynamicKey(dmEl,topEl,ratio){
  if(!dmEl||!topEl||ratio<28)return null;
  if(topEl===dmEl)return`${dmEl}_same`;
  if(GEN[topEl]===dmEl)return`${dmEl}_fed`;
  if(CTR[topEl]===dmEl)return`${dmEl}_attacked`;
  if(GEN[dmEl]===topEl)return`${dmEl}_drains`;
  if(CTR[dmEl]===topEl)return`${dmEl}_controls`;
  return null;
}

    pure:`<strong>純格 (ดวงบริสุทธิ์)</strong> — Pattern ของคุณชัดเจนและไม่ถูกรบกวน ศักยภาพแสดงออกได้ตรงและสม่ำเสมอ เส้นทางชีวิตค่อนข้างชัด เมื่อ Luck Pillar เสริม Useful God = ความสำเร็จมาตามธรรมชาติ`,
    affectionate:`<strong>有情格 (ดวงที่มีความกลมกลืน)</strong> — Pattern ไม่สมบูรณ์แบบ แต่ Ten Gods ในดวงมี "情" (affection) ต่อกัน — มีตัวช่วยแก้ความขัดแย้ง ความสำเร็จต้องอาศัยการเลือก Luck Pillar ที่ถูกต้อง`,
    mixed:`<strong>雜格 (ดวงหลายทิศ)</strong> — มีพลังงานหลายทิศทางในดวง ชีวิตอาจดูไม่มีทิศทางชัดในช่วงต้น แต่เมื่อพบ Luck Pillar ที่ "ชำระ" ความขัดแย้ง = พลังทั้งหมดจะรวมตัว`,
  };
  // 情 (Affection) analysis — detect key TG pairs
  const allTGIdx=tenGods.map(t=>t.tgIdx);
  const qingPairs=[];
  if(allTGIdx.includes(7)&&allTGIdx.includes(9))qingPairs.push('官印相生 — Officer + Resource ส่งเสริมกัน → เส้นทางสำเร็จในองค์กรและสถาบัน');
  if(allTGIdx.includes(2)&&allTGIdx.includes(6))qingPairs.push('食神制杀 — พรสวรรค์ควบคุมแรงกดดัน → พลังงานสูงถูกแปลงเป็นความสำเร็จ');
  if(allTGIdx.includes(3)&&allTGIdx.includes(4))qingPairs.push('傷官生财 — ความฉลาดพิเศษสร้างทรัพย์ → ใช้ความคิดสร้างสรรค์เป็นเครื่องมือหาเงิน');
  if(allTGIdx.includes(6)&&allTGIdx.includes(9))qingPairs.push('杀印相生 — แรงกดดันถูกปัญญาแปลงเป็นพลัง → ผู้นำที่แข็งแกร่งและฉลาด');
  if(allTGIdx.includes(3)&&allTGIdx.includes(7))qingPairs.push('⚠️ 傷官见官 — ความฉลาดขัดกับระเบียบ → ระวังความขัดแย้งกับผู้มีอำนาจ หลีกเลี่ยงตำแหน่งราชการ');
  if(allTGIdx.includes(5)&&allTGIdx.includes(9))qingPairs.push('⚠️ 财破印 — ทรัพย์อาจทำลายการศึกษา → อย่าทิ้งความรู้เพื่อเงินระยะสั้น');
  if(allTGIdx.includes(8)&&allTGIdx.includes(2))qingPairs.push('⚠️ 枭神夺食 — อินนอกอาจดูดพลังพรสวรรค์ → ระวัง LP ที่นำ 偏印 เข้า');
  const p45_purity=purityMeaning[pur]||'';
  const p45_qing=qingPairs.length?`ปฏิสัมพันธ์หลักใน "情" (affection) ของดวง:<br>${qingPairs.map(q=>`• ${q}`).join('<br>')}`:'' ;
  const p45=[p45_purity,p45_qing].filter(Boolean).join('<br><br>');

  // Para 5: Key Ten Gods + clashes
  const TG_PRIORITY=[7,6,5,4,3,2,9,8,1,0];
  const seen=new Set();const picked=[];
  for(const pri of TG_PRIORITY){
    const found=tenGods.find(tg=>tg.tgIdx===pri&&!seen.has(pri));
    if(found){seen.add(pri);picked.push(found);if(picked.length>=2)break;}
  }
  const tgLines=picked.map(tg=>{
    const tf=TG_FULL[tg.tgIdx];
    const _pk=tg.label.includes('ปี')?'year':tg.label.includes('เดือน')?'month':tg.label.includes('วัน')?'day':'hour';
    const pillarNarr=tf.pillar[_pk]||'';
    return `<strong>${TG_ZH[tg.tgIdx]} (${TG_TH[tg.tgIdx]})</strong> ใน${tg.label} — ${tf.core}${pillarNarr?`<br><span style="font-size:.82rem;color:var(--primary2)">↳ ตำแหน่งนี้: ${pillarNarr}</span>`:''}`;
  }).join('<br>');
  const PILLAR_NAMES=['เสาปี','เสาเดือน','เสาวัน','เสาชั่วโมง'];
  const PILLAR_DOMAINS=['รากฐาน/บรรพบุรุษ','อาชีพ/สภาพแวดล้อมหลัก','ตัวตน/คู่ครอง','ลูก/มรดก/บั้นปลาย'];
  const pillBi=[chart.yearP.bi,chart.monthP.bi,chart.dayP.bi,chart.hourP.bi];
  const clashLines=[];
  for(const c of BRANCH_SIX_CHONG){
    if(pillBi.includes(c.a)&&pillBi.includes(c.b)){
      const iA=pillBi.indexOf(c.a),iB=pillBi.indexOf(c.b);
      const pA=PILLAR_NAMES[iA],pB=PILLAR_NAMES[iB];
      const dA=PILLAR_DOMAINS[iA],dB=PILLAR_DOMAINS[iB];
      clashLines.push(`<em>${c.zh}</em> (${pA}↔${pB}) — ${c.narr} <span style="font-size:.8rem;color:var(--muted)">[${dA} ปะทะ ${dB}]</span>`);
    }
  }
  // 六合 + 三合 harmony between natal chart pillars
  const chartInts=detectBranchInteractions(yearP.bi,monthP.bi,dayP.bi,hourP.bi);
  const PP_DOMAIN={'0,1':'รากฐาน↔อาชีพ','0,2':'รากฐาน↔ตัวตน','0,3':'รากฐาน↔ลูก/มรดก','1,2':'อาชีพ↔ตัวตน','1,3':'อาชีพ↔ลูก/มรดก','2,3':'ตัวตน↔ลูก/มรดก'};
  const hexHeLines=chartInts.sixHe.map(h=>{const key=[Math.min(h.pi,h.pj),Math.max(h.pi,h.pj)].join(',');const dom=PP_DOMAIN[key]||'';return `<em>${h.zh}</em> (${PILLAR_NAMES[h.pi]}↔${PILLAR_NAMES[h.pj]}) — ${h.narr}${dom?` <span style="font-size:.8rem;color:var(--muted)">[${dom}]</span>`:''}`;});
  const triHeLines=chartInts.threeHe.map(h=>{const pNames=h.pils.map(p=>PILLAR_NAMES[p]).join('↔');return `<em>${h.zh}</em> (${pNames}) ${h.full?'✓':'◑'} ${h.narr}`;});
  const p5=[tgLines,clashLines.length?`<strong>การชนที่พบในดวง (六冲):</strong><br>${clashLines.join('<br>')}` :'',hexHeLines.length?`<strong>การรวมพลัง (六合):</strong><br>${hexHeLines.join('<br>')}` :'',triHeLines.length?`<strong>สามประสาน (三合):</strong><br>${triHeLines.join('<br>')}` :''].filter(Boolean).join('<br><br>');

  // LP timing — shared by Para 5.5 and Para 6
  const currentYear=new Date().getFullYear();
  const birthYear=chart.tst?chart.tst.y:(currentYear-30);
  const currentAge=currentYear-birthYear;
  const currentLP=luckPillars?luckPillars.find(lp=>currentAge>=lp.startAge&&currentAge<=lp.endAge):null;

  // Para 5.5: Shen Sha — natal stars + LP activation
  const shenShas=calcShenSha(dmIdx,yearP,monthP,dayP,hourP);
  let p55='';
  if(shenShas.length&&currentLP){
    const sorted=[...shenShas].sort((a,b)=>(b.auspicious?1:0)-(a.auspicious?1:0));
    const top3=sorted.slice(0,3);
    const ymGrp=sanhe(dayP.bi);
    const ymBi_=[2,5,8,11][Math.max(ymGrp,0)];
    const thBi_=[9,0,3,6][Math.max(ymGrp,0)];
    const hgBi_=[4,7,10,1][Math.max(ymGrp,0)];
    const jsBi_=[0,3,6,9][Math.max(ymGrp,0)];
    const wcBi_=WENCHANGGUI[dmIdx];
    const tyBi_=TIANYIGUI[dmIdx]||[];
    const lpBi=currentLP.bi,lpSi=currentLP.si;
    const dmEl=STEMS[dmIdx].el;
    const ctrlEl=Object.keys(CTR).find(k=>CTR[k]===dmEl)||'';
    const lpSEl=STEMS[lpSi].el,lpBEl=BRANCHES[lpBi].el;
    const lpHasSK=lpSEl===ctrlEl||lpBEl===ctrlEl;
    const hasMitigator=tenGods.some(tg=>tg.tgIdx===2||tg.tgIdx===7);
    const SS_ACT_TEXT={'天乙贵人':'ช่วงนี้มักพบผู้อุปถัมภ์หรือโอกาสจากผู้ใหญ่ที่ยื่นมือเข้าช่วย','驿马星':'ช่วงนี้มีแรงขับเคลื่อนให้ย้าย เดินทาง หรือเปลี่ยนสถานที่ทำงาน','桃花星':'ช่วงนี้เสน่ห์เพิ่ม มีโอกาสพบความรักหรืองานสร้างสรรค์โดดเด่น','文昌贵人':'ช่วงนี้เหมาะกับการเรียน สอบ และงานวิชาการหรือเอกสาร','华盖':'ช่วงนี้เหมาะกับการหันเข้าหาตัวเอง งานศิลปะ หรือการพัฒนาจิตใจ','将星':'ช่วงนี้บทบาทผู้นำและอำนาจการตัดสินใจเด่นขึ้น','太极贵人':'ช่วงนี้ปัญญาและสัญชาตญาณเฉียบคม เหมาะกับการวางแผนใหญ่','天德贵人':'ช่วงนี้ได้รับการคุ้มครองจากฟ้า แคล้วคลาดจากอุปสรรคได้ง่ายกว่าปกติ','月德贵人':'ช่วงนี้ได้รับความเมตตาและคุณธรรมจากผู้อื่น','羊刃':'ช่วงนี้ควรระวังการตัดสินใจหุนหันพลันแล่นและอุบัติเหตุ'};
    function isSsActivated(star){switch(star.zh){case '天乙贵人':return tyBi_.includes(lpBi);case '驿马星':return (lpBi+6)%12===ymBi_||(ymBi_+6)%12===lpBi;case '桃花星':return lpBi===thBi_||(lpBi+6)%12===thBi_;case '文昌贵人':return lpBi===wcBi_;case '华盖':return lpBi===hgBi_;case '将星':return lpBi===jsBi_;case '羊刃':return lpHasSK;default:return false;}}
    const ssLines=top3.map(star=>{
      const locStr=star.locs.join(', ');
      const dot=star.auspicious?'🟡':'🔴';
      const activated=isSsActivated(star);
      const actText=SS_ACT_TEXT[star.zh]||'';
      let ln=`${dot} <strong>${star.zh}</strong> (${star.th}) ที่ ${locStr} — ${star.desc}`;
      if(activated&&actText){
        const warn=(star.zh==='羊刃'&&!hasMitigator)?' <span style="color:#ef4444;font-weight:600">⚠️ ไม่มี正官/食神 ควบ — ระวังวิกฤต</span>':'';
        ln+=`<br><span style="font-size:.82rem;color:var(--primary2);font-style:italic">↳ LP กระตุ้นดาวนี้: ${actText}${warn}</span>`;
      }
      return ln;
    });
    p55=ssLines.join('<br><br>');
  }

  // Para 6: Current Luck Pillar — Elemental Phase + road metaphor
  let p6='';
  if(currentLP){
    const lpS=STEMS[currentLP.si],lpB=BRANCHES[currentLP.bi];
    let qKey='neutral';
    if(ugEl){
      const lpEls=[lpS.el,lpB.el];
      if(lpEls.includes(ugEl))qKey='same';
      else if(lpEls.some(e=>GEN[e]===ugEl))qKey='gen';
      else if(lpEls.some(e=>CTR[e]===ugEl))qKey='ctr';
      else if(lpEls.some(e=>GEN[ugEl]===e))qKey='weakens';
    }
    const q=LP_QUALITY_DESC[qKey];
    const lpRN=LP_ROAD_NARR[qKey]||{};
    const roadNarr=lpRN.narr||'';
    const yearsInLP=currentAge-currentLP.startAge;
    const arcPhase=yearsInLP<=3?'early':yearsInLP<=7?'mid':'late';
    const arcNarr=lpRN[arcPhase]||'';
    const arcLabel={'early':'⏳ ช่วงต้น (ปี 1-3): ทดสอบและปรับตัว','mid':'🔥 ช่วงกลาง (ปี 4-7): แสดงผลเต็มที่','late':'🌾 ช่วงปลาย (ปี 8-10): เก็บเกี่ยวและเตรียมเปลี่ยน'}[arcPhase]||'';
    const stemBrNote=yearsInLP<5?`กิ่งฟ้า <em>${lpS.zh}</em> นำ (三七开 ครึ่งแรก) — ผลชีวิตภายนอกชัดกว่า`:`ก้านดิน <em>${lpB.zh}</em> นำ (三七开 ครึ่งหลัง) — ผลชีวิตเชิงโครงสร้างลึกกว่า`;
    const transWarn=yearsInLP>=8?`<br><span style="font-size:.81rem;background:#fef3c718;color:#92400e;border:1px solid #f59e0b66;border-radius:6px;padding:.18rem .5rem;display:inline-block;margin-top:.3rem">⚠️ 交运 — อีก ${10-yearsInLP} ปีเข้าสู่ LP ใหม่ หลีกเลี่ยงตัดสินใจครั้งใหญ่ในช่วงนี้</span>`:'';
    p6=`ตอนนี้คุณอยู่ใน<em>ช่วงชีวิต ${lpS.zh}${lpB.zh}</em> (อายุ ${currentLP.startAge}–${currentLP.endAge} ปี) — <strong style="color:${q.color}">${q.icon} ${q.label}</strong> ${roadNarr}${arcNarr?`<br><span style="font-size:.83rem;color:var(--primary2);font-style:italic">↳ ${arcNarr}</span>`:''}<br><span style="font-size:.79rem;color:var(--muted)">${arcLabel} · ${stemBrNote}</span>${transWarn}${pn.peak?`<br><span style="font-size:.85rem;color:var(--muted)">ตำราบอกว่า: ${pn.peak}</span>`:''}`;
  }

  // Para 7: Prescription
  const prescParts=[pn.ug_tip,pn.challenge,ugG.fin?`ด้านการเงิน: ${ugG.fin}`:''].filter(Boolean);
  const p7=prescParts.join(' — ');

  // Para 8: Hour Pillar Legacy — children, endgame, inner world
  const hourTG=tenGods.find(tg=>tg.label==='กิ่งฟ้าชั่วโมง');
  let p8='';
  if(hourTG){
    const htf=TG_FULL[hourTG.tgIdx];
    const hPillarNarr=htf.pillar&&htf.pillar.hour?htf.pillar.hour:'';
    p8=`ปลายชีวิตและมรดกของคุณสะท้อนผ่าน <strong>${TG_ZH[hourTG.tgIdx]} (${TG_TH[hourTG.tgIdx]})</strong> ในเสาชั่วโมง — ${hPillarNarr?hPillarNarr+' ':''}<span style="font-size:.85rem;color:var(--muted)">บุคลิกแกนของ TG นี้: ${htf.core}</span>`;
  }

  // ── Build card ──
  const paras=[
    {label:'🏛️ รากฐาน',text:p0},
    {label:'✦ ตัวตน',text:p1},
    {label:'☯ พลังธาตุ',text:p2},
    {label:'🌊 กระแสธาตุ',text:p25},
    {label:'🌿 เส้นทางชีวิต',text:p3},
    {label:'💼 อาชีพ & การเงิน',text:p4},
    {label:'🔗 โครงสร้างดวง (情 × 格局)',text:p45},
    {label:'⚡ แรงตึงในดวง',text:p5},
    {label:'⭐ ดาวพิเศษในดวง',text:p55},
    {label:'🕐 ช่วงชีวิตปัจจุบัน',text:p6},
    {label:'🔮 คำแนะนำจากตำรา',text:p7},
    {label:'🌙 ปลายทาง',text:p8},
  ].filter(x=>x.text);

  const wrap=document.createElement('div');wrap.className='master-reading';
  const titleWrap=document.createElement('div');
  titleWrap.style.cssText='margin-bottom:1.1rem;border-bottom:1px solid var(--border);padding-bottom:.75rem';
  titleWrap.innerHTML=`<div style="font-weight:800;font-size:1rem;color:var(--primary);letter-spacing:.02em;margin-bottom:.35rem">การอ่านดวงชะตา — บทสรุปจากตำราโบราณ</div><div style="font-size:.82rem;color:var(--muted);line-height:1.55">ดวงชะตาคือแผนที่ ไม่ใช่บทละครที่ถูกเขียนตายตัว — สิ่งที่อ่านอยู่นี้ไม่ได้บอกว่าชีวิตคุณจะเป็นอะไร แต่บอกว่า <em style="color:var(--fg)">สภาพอากาศที่คุณกำลังเดินทางอยู่คืออะไร</em></div>`;
  wrap.appendChild(titleWrap);
  paras.forEach((para,i)=>{
    const block=document.createElement('div');block.className='mr-para';
    block.innerHTML=`<div class="mr-label">${para.label}</div><div class="mr-text">${para.text}</div>`;
    wrap.appendChild(block);
    if(i<paras.length-1){const hr=document.createElement('hr');hr.className='mr-divider';wrap.appendChild(hr);}
  });
  sec.appendChild(wrap);
}

function renderSnapshot(chart,sec){
  sec.innerHTML='';
  const{dmIdx,strength,pattern,usefulGod,luckPillars}=chart;
  const dm=STEMS[dmIdx];
  const prof=DM_PROFILES?DM_PROFILES[dmIdx]:null;
  const pn=getPatternNarrative(pattern)||{};
  const pd=getPatternData(pattern)||{};
  const sm=strengthMeta(strength);
  const ugEl=usefulGod&&usefulGod.balance&&usefulGod.balance.el;
  const ugNarr=ugEl&&UG_EL_NARRATIVE?UG_EL_NARRATIVE[ugEl]:'';

  // Hero card
  const hero=document.createElement('div');hero.className='snap-hero';
  const dmIcon=prof?prof.image||'✦':'✦';
  hero.innerHTML=`<div class="snap-hero-title">${dmIcon} ${dm.zh} ${dm.th} — ${EL_TH[dm.el]} ${dm.yin?'ยิน':'หยาง'}</div>
    <div class="snap-hero-sub">${pd.name||pattern&&pattern.patternName||'—'} · DM ${sm.label} ${sm.th} (${strength}%) · UG: ${ugEl?EL_TH[ugEl]:'—'}</div>`;
  sec.appendChild(hero);

  // Best LP
  let bestLpText='—';
  if(luckPillars&&luckPillars.length&&ugEl){
    const bestLp=luckPillars.reduce((best,lp)=>{
      const lpEls=[STEMS[lp.si].el,BRANCHES[lp.bi].el];
      const score=lpEls.includes(ugEl)?2:lpEls.some(e=>GEN[e]===ugEl)?1:0;
      return score>best.score?{lp,score}:best;
    },{lp:luckPillars[0],score:-1});
    if(bestLp.lp)bestLpText=`อายุ ${bestLp.lp.startAge}–${bestLp.lp.endAge} (${STEMS[bestLp.lp.si].zh}${BRANCHES[bestLp.lp.bi].zh})`;
  }

  const rows=[
    ['🧠','ตัวตน',prof?prof.label||dm.th:dm.th,prof?prof.core||'':''],
    ['💼','อาชีพ',pn.career?pn.career.split('—')[0].split('·')[0].substring(0,60)+(pn.career.length>60?'…':''):'ดูรายละเอียดในแท็บ格局'],
    ['💰','ทรัพย์',pn.wealth?pn.wealth.substring(0,70)+(pn.wealth.length>70?'…':''):'ดูรายละเอียดในแท็บ格局'],
    ['⚡','ความท้าทาย',pn.challenge?pn.challenge.substring(0,70)+(pn.challenge.length>70?'…':''):'ดูรายละเอียดในแท็บ格局'],
    ['⭐','ช่วงดีสุด',bestLpText],
    ['🔑','สิ่งที่ต้องเสริม',ugNarr||pn.ug_tip||'ดูรายละเอียดในแท็บ格局'],
  ];
  const rowsEl=document.createElement('div');rowsEl.className='snap-rows';
  for(const[icon,label,...texts]of rows){
    const row=document.createElement('div');row.className='snap-row';
    const mainText=texts[0]||'';
    const subText=texts[1]||'';
    row.innerHTML=`<div class="snap-icon">${icon}</div><div><div class="snap-label">${label}</div><div>${mainText}${subText?`<div style="font-size:.8rem;color:var(--muted);margin-top:.15rem">${subText}</div>`:''}</div></div>`;
    rowsEl.appendChild(row);
  }
  sec.appendChild(rowsEl);

  // Quick links hint
  const hint=document.createElement('div');hint.style.cssText='text-align:center;margin-top:.8rem;font-size:.75rem;color:var(--muted)';
  hint.textContent='ดูรายละเอียดเพิ่มเติมในแต่ละแท็บด้านบน →';
  sec.appendChild(hint);
}

function renderInterpretation(chart,sec){
  sec.innerHTML='';
  renderFortuneCard(chart,sec);
  renderMasterReading(chart,sec);
  const{dmIdx,strength,tenGods,elBalance,pattern,usefulGod,luckPillars}=chart;
  const dm=STEMS[dmIdx];
  const topEl=Object.entries(elBalance.pct).sort((a,b)=>b[1]-a[1])[0];

  // ── Ten Gods in this chart ──
  const tgTitle=document.createElement('div');

  const posLabels=['กิ่งฟ้าปี','กิ่งฟ้าเดือน','กิ่งฟ้าชั่วโมง','ก้านดินปี','ก้านดินเดือน','ก้านดินวัน','ก้านดินชั่วโมง'];
  const pillarPos=[0,1,3,3,1,2,3]; // year/month/hour stem → pillar domain index

  for(let i=0;i<tenGods.length;i++){
    const tg=tenGods[i];if(tg.tgIdx<0)continue;
    const tf=TG_FULL[tg.tgIdx];
    const pillarKey=['year','month','day','hour'];

    let domain='';

    else if(tg.label.includes('วัน'))domain=PILLAR_DOMAINS[2];

    const tgCard=document.createElement('div');tgCard.className='tg-interp-card';

    tgCard.innerHTML=`

  // ── Dominant Element insight ──

        🏥 สุขภาพ: ${topElF.health} &nbsp;|&nbsp;
        💼 อาชีพ: ${topElF.career}<br>
        🎨 สี: ${topElF.color} &nbsp;|&nbsp; 🧭 ทิศ: ${topElF.dir} &nbsp;|&nbsp; 🌸 ฤดู: ${topElF.season}

// ─── D2: COMPATIBILITY ────────────────────────────────────────────────────
function computeCompatibility(chartA,chartB){
  const tgAtoB=getTenGodIdx(chartA.dmIdx,chartB.dmIdx); // how A sees B's DM
  const tgBtoA=getTenGodIdx(chartB.dmIdx,chartA.dmIdx); // how B sees A's DM
  const gA=chartA.gender,gB=chartB.gender;

  // Spouse stars: male→正财(5)/偏财(4), female→正官(7)/七杀(6)
  const isSpouseFor=(tg,g)=>(g==='m'&&(tg===5||tg===4))||(g==='f'&&(tg===7||tg===6));
  const aSeesSpouse=isSpouseFor(tgAtoB,gA);
  const bSeesSpouse=isSpouseFor(tgBtoA,gB);

  let stars,synergy;
  if(aSeesSpouse&&bSeesSpouse){
    stars=5;synergy='ดวงคู่ที่สมบูรณ์แบบ — ต่างฝ่ายต่างเป็นดาวคู่ครองของกันและกัน';
  } else if(aSeesSpouse||bSeesSpouse){
    stars=4;synergy='ความดึงดูดโรแมนติกแข็งแกร่ง — ฝ่ายหนึ่งเป็นดาวคู่ครองของอีกฝ่าย';
  } else if([4,5,6,7].includes(tgAtoB)&&[4,5,6,7].includes(tgBtoA)){
    stars=4;synergy='แรงดึงดูดสูง — ทั้งคู่มีดาวความสัมพันธ์ต่อกัน';
  } else if(tgAtoB===3&&tgBtoA===7||tgAtoB===7&&tgBtoA===3){
    stars=2;synergy='傷官見官 — ความตึงเครียดสูง ขัดแย้งกับบรรทัดฐาน ต้องใช้ความเข้าใจมาก';
  } else if((tgAtoB===0||tgAtoB===1)&&(tgBtoA===0||tgBtoA===1)){
    stars=2;synergy='Peer พลังงาน — เหมือนพี่น้อง เพื่อน ขาดแรงดึงดูดโรแมนติก';
  } else if([8,9].includes(tgAtoB)||[8,9].includes(tgBtoA)){
    stars=3;synergy='ความสัมพันธ์แบบให้การสนับสนุนและเรียนรู้ร่วมกัน';
  } else if([2,3].includes(tgAtoB)||[2,3].includes(tgBtoA)){
    stars=3;synergy='ความสัมพันธ์แบบสร้างสรรค์และดูแลกัน';
  } else {
    stars=3;synergy='ความสัมพันธ์ที่สมดุล — ขึ้นอยู่กับดวงโดยรวมและ Luck Pillar';
  }
  return{tgAtoB,tgBtoA,stars,synergy};
}

function copyChartLink(){
  navigator.clipboard.writeText(location.href).then(function(){
    var btn=document.getElementById('copy-link-btn');
    var orig=btn.innerHTML;
    btn.innerHTML='✓ คัดลอกแล้ว!';
    setTimeout(function(){btn.innerHTML=orig;},2000);
  }).catch(function(){
    var dummy=document.createElement('input');
    dummy.value=location.href;document.body.appendChild(dummy);
    dummy.select();document.execCommand('copy');document.body.removeChild(dummy);
    var btn=document.getElementById('copy-link-btn');
    var orig=btn.innerHTML;btn.innerHTML='✓ คัดลอกแล้ว!';
    setTimeout(function(){btn.innerHTML=orig;},2000);
  });
}

// Populate day select
function updateDays(){
  const y=+document.getElementById('f-year').value||2000;
  const m=+document.getElementById('f-month').value||1;
  const days=new Date(y,m,0).getDate();
  const sel=document.getElementById('f-day');const cur=+sel.value;
  sel.innerHTML='<option value="">-- เลือก --</option>';
  for(let i=1;i<=days;i++){const o=document.createElement('option');o.value=i;o.textContent=i;if(i===cur)o.selected=true;sel.appendChild(o);}

document.getElementById('bazi-form').addEventListener('submit',function(e){
  e.preventDefault();
  const year=+document.getElementById('f-year').value;
  const month=+document.getElementById('f-month').value;
  const day=+document.getElementById('f-day').value;
  const noTime=document.getElementById('f-notime').checked;
  const h=noTime?12:+document.getElementById('f-hour').value;
  const min=noTime?0:+(document.getElementById('f-min').value||0);
  const gender=document.getElementById('f-gender').value;
  const cityKey=document.getElementById('f-city').value;
  let longitude=THAI_CITIES[cityKey]?THAI_CITIES[cityKey].lon:null;
  if(cityKey==='custom'){
    longitude=+document.getElementById('f-lon').value;
    if(!longitude||longitude<90||longitude>115){alert('กรุณากรอกลองจิจูดที่ถูกต้อง (90–115 องศา)');return;}
  }
  if(!year||!month||!day||isNaN(h)||h<0||h>23||min<0||min>59||!gender)return;

  try{
    const earlyZi=document.querySelector('input[name=ziRule]:checked')?.value==='late';
    const chart=calculateBazi(year,month,day,h,min,gender,longitude,earlyZi);
    const wa=document.getElementById('warn-area');wa.innerHTML='';

    // Historical timezone notice
    if(chart.tst.tz===9){
      const ti=document.createElement('div');ti.className='alert alert-warn';
      ti.innerHTML='🕰 ช่วงสงครามโลกครั้งที่ 2 — ไทยใช้เวลาญี่ปุ่น <strong>UTC+9</strong> (1941-12-08 ถึง 1945-09-15) ได้ปรับแล้ว';
      wa.appendChild(ti);
    }

    // TST info
    const pad=n=>String(n).padStart(2,'0');
    const sign=chart.tst.corrMin>=0?'+':'';
    const cityName=cityKey==='custom'?`${longitude}°E`:(THAI_CITIES[cityKey]?.name||'');
    const ti=document.createElement('div');ti.className='alert alert-info';
    ti.innerHTML=`⏱ <strong>เวลาสุริยะแท้ (真太陽時)</strong> ${cityName}: <strong>${pad(h)}:${pad(min)}</strong> → <strong>${pad(chart.tst.h)}:${pad(chart.tst.min)}</strong> น. (${sign}${Math.round(chart.tst.corrMin)} นาที)`;
    wa.appendChild(ti);

    // Hour pillar changed warning
    if(chart.hourPillarChanged){
      const hw=document.createElement('div');hw.className='alert alert-warn';
      hw.innerHTML=`⚠️ <strong>เสาชั่วโมงเปลี่ยน</strong> หลังปรับเวลาสุริยะ: ${BRANCHES[chart.origHourBi].zh} ${BRANCHES[chart.origHourBi].th} → ${BRANCHES[chart.hourP.bi].zh} ${BRANCHES[chart.hourP.bi].th}`;
      wa.appendChild(hw);
    }

    if(noTime){const nw=document.createElement('div');nw.className='alert alert-warn';nw.textContent='⚠️ ใช้เวลาประมาณ 12:00 น. — เสาชั่วโมงอาจไม่ถูกต้อง';wa.appendChild(nw);}
    if(chart.nearBoundary){const nb=document.createElement('div');nb.className='alert alert-warn';nb.textContent='⚠️ ใกล้ขอบปักษ์สุริยะ — เสาเดือนและปีอาจคลาดเคลื่อน';wa.appendChild(nb);}

    // Render all sections
    renderPillars(chart,document.getElementById('pillar-section'));
    renderDayMaster(chart,document.getElementById('daymaster-section'));
    renderElementBalance(chart,document.getElementById('elements-section'));
    renderTenGods(chart,document.getElementById('tengods-section'));
    renderPattern(chart,document.getElementById('pattern-section'));
    renderLuckPillars(chart,document.getElementById('luckpillars-section'));
    renderAnnualLuck(chart,document.getElementById('annual-section'));
    renderMonthlyForecast(chart,document.getElementById('monthly-section'));
    renderDailyForecast(chart,document.getElementById('daily-section'));
    renderShenSha(chart,document.getElementById('shensha-section'));
    renderInterpretation(chart,document.getElementById('interp-section'));
    renderSnapshot(chart,document.getElementById('snapshot-section'));
    // Inject tooltips once after all content is rendered
    injectTooltips(document.getElementById('output'));

    document.getElementById('output').style.display='block';
    document.getElementById('output').scrollIntoView({behavior:'smooth',block:'start'});
    // Push shareable URL
    const sp=new URLSearchParams({y:year,m:month,d:day,h,min,g:gender,city:cityKey});
    if(noTime)sp.set('nt','1');
    if(cityKey==='custom')sp.set('lon',longitude);
    history.replaceState(null,'','?'+sp.toString());
    // D2: expose chart for compatibility and show compat form
    currentChart=chart;
    document.getElementById('compat-wrap').style.display='block';
    document.getElementById('compat-result').innerHTML='';
  }catch(err){
    alert('เกิดข้อผิดพลาด: '+err.message);console.error(err);
  }
});

// Auto-load chart from URL params (shareable link)
(function loadFromURL(){
  var p=new URLSearchParams(location.search);
  if(!p.get('y')||!p.get('m')||!p.get('d')||!p.get('g'))return;
  document.getElementById('f-year').value=p.get('y');
  document.getElementById('f-month').value=p.get('m');
  updateDays();
  document.getElementById('f-day').value=p.get('d');
  var notime=p.get('nt')==='1';
  var ntCb=document.getElementById('f-notime');
  ntCb.checked=notime;
  document.getElementById('time-fields').style.display=notime?'none':'grid';
  if(notime){document.getElementById('f-hour').removeAttribute('required');}
  else{
    if(p.get('h')!==null)document.getElementById('f-hour').value=p.get('h');
    if(p.get('min')!==null)document.getElementById('f-min').value=p.get('min');
  }
  document.getElementById('f-gender').value=p.get('g');
  var city=p.get('city')||'bkk';
  document.getElementById('f-city').value=city;
  if(city==='custom'&&p.get('lon')){
    document.getElementById('custom-lon-wrap').style.display='block';
    document.getElementById('f-lon').value=p.get('lon');
  }
  document.getElementById('bazi-form').dispatchEvent(new Event('submit'));
})();
